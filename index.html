<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Rehab Platform - 언어재활 게임 플랫폼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --primary-light: #E8F2FF;
            --success: #5BC236;
            --success-dark: #4A9E2D;
            --danger: #E74C3C;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --text-muted: #BDC3C7;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --border-color: #E1E8ED;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #F5F7FA 0%, #F8F9FB 100%);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .navbar {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar-subtitle {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="text"], input[type="number"], input[type="search"] {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus, input[type="search"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-success {
            background: var(--success);
            color: white;
            width: 100%;
        }

        .btn-success:hover {
            background: var(--success-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #C0392B;
        }

        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .button-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .game-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .game-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .game-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }

        .game-actions {
            display: flex;
            gap: 0.4rem;
        }

        .game-actions button {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.8rem;
        }

        .file-input-section {
            display: none;
        }

        .file-input-section.active {
            display: block;
        }

        .file-input-info {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
            font-size: 0.9rem;
        }

        .box-setup-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .box-setup-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        .box-setup-item-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        .box-setup-item-tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }

        .box-setup-item-tab {
            flex: 1;
            padding: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }

        .box-setup-item-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .box-setup-item-content {
            display: none;
            flex: 1;
        }

        .box-setup-item-content.active {
            display: flex;
            flex-direction: column;
        }

        .file-input {
            padding: 0.4rem;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-bottom: 0.8rem;
        }

        .preview {
            width: 100%;
            height: 80px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .search-input-group {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }

        .search-input-group input {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.8rem;
        }

        .search-input-group button {
            padding: 0.4rem 0.6rem;
            font-size: 0.7rem;
            width: auto;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 0.8rem;
            flex: 1;
        }

        .search-result-item {
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--bg-primary);
            border: 2px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .search-result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .search-result-item.selected {
            border-color: var(--success);
            box-shadow: inset 0 0 0 2px var(--success);
        }

        .loading {
            text-align: center;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gallery-section {
            display: none;
        }

        .gallery-section.active {
            display: block;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .gallery-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            margin-bottom: 1.5rem;
        }

        .box {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .box:hover:not(.disabled) {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .box.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .box.opened {
            background: var(--bg-primary);
        }

        .box.empty {
            background: #2C3E50;
        }

        .box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 85vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
        }

        .modal-image {
            max-width: 80vw;
            max-height: 60vh;
            object-fit: contain;
            margin-bottom: 1rem;
        }

        .modal-close-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .copy-url {
            background: var(--bg-secondary);
            padding: 0.8rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .copy-url input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .copy-url button {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            width: auto;
        }

        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1rem;
            }

            .card {
                padding: 1rem;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .game-list {
                grid-template-columns: 1fr;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }

            .box-setup-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div>
                <div class="navbar-brand">🎨 Language Rehab</div>
                <div class="navbar-subtitle">언어재활 게임 플랫폼</div>
            </div>
            <div style="font-size: 0.75rem; color: var(--text-secondary);">v4.1</div>
        </div>
    </nav>

    <div class="container">
        <!-- 게임 목록 섹션 -->
        <div class="card" id="homeSection">
            <h2 class="card-title">📚 내 게임</h2>
            
            <button class="btn-success" onclick="showCreateForm()" style="margin-bottom: 1.5rem;">
                ➕ 새 게임 만들기
            </button>

            <div id="gameListContainer">
                <p style="text-align: center; color: var(--text-secondary); padding: 1.5rem;">게임이 없습니다. 새 게임을 만들어보세요!</p>
            </div>
        </div>

        <!-- 게임 생성 섹션 -->
        <div class="card" id="createSection" style="display: none;">
            <h2 class="card-title">새 게임 만들기</h2>
            
            <div class="form-group">
                <label class="form-label">게임 이름</label>
                <input type="text" id="gameName" placeholder="예: 동물 학습, 과일 카드" />
            </div>

            <div class="form-group">
                <label class="form-label">박스 개수 (1~100)</label>
                <input type="number" id="boxCount" min="1" max="100" value="6" />
            </div>

            <button class="btn-primary" onclick="createGameSetup()">박스 생성</button>

            <div class="file-input-section" id="fileInputSection">
                <div class="file-input-info">📁 각 박스마다 파일로 업로드하거나 검색으로 이미지를 선택하세요</div>

                <div class="box-setup-container" id="boxSetupContainer"></div>

                <div class="button-group" style="margin-top: 1.5rem;">
                    <button class="btn-success" onclick="saveGame()">게임 저장 💾</button>
                    <button class="btn-secondary" onclick="cancelCreate()">취소</button>
                </div>
            </div>
        </div>

        <!-- 게임 플레이 섹션 -->
        <div class="card" id="playSection" style="display: none;">
            <div class="gallery-header">
                <h2 class="card-title" style="margin: 0;" id="playGameTitle">게임 플레이</h2>
                <div class="button-group" style="flex: 1; max-width: 400px;">
                    <button class="btn-success" onclick="playGame()">플레이 ▶</button>
                    <button class="btn-primary btn-small" onclick="shuffleGame()">섞기 🔀</button>
                    <button class="btn-secondary btn-small" onclick="resetGamePlay()">리셋</button>
                    <button class="btn-secondary btn-small" onclick="backToHome()">뒤로</button>
                </div>
            </div>

            <div id="copyUrlSection" style="display: none;">
                <p style="margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">공유 링크:</p>
                <div class="copy-url">
                    <input type="text" id="gameUrl" readonly />
                    <button class="btn-primary" onclick="copyGameUrl()">복사</button>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">이 링크를 공유하면 누구나 이 게임을 플레이할 수 있습니다!</p>
            </div>

            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <!-- 이미지 확대 모달 -->
    <div class="modal" id="imageModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImage" class="modal-image" alt="확대 이미지" />
            <div class="modal-close-hint">빈칸을 누르면 닫힙니다</div>
        </div>
    </div>

    <script>
        const UNSPLASH_API_KEY = 'ZTh8PQhZ5jKb_QBgbuFjAmL5awMh-xM3gK8PLno5ZZQ';

        let games = {};
        let currentGameId = null;
        let files = [];
        let gameImages = [];
        let isPlaying = false;
        let clickedBoxes = new Set();
        let boxCount = 0;
        let currentSearchResults = {};

        // 초기화
        function init() {
            loadGames();
            checkUrlGame();
        }

        // 로컬 스토리지에서 게임 로드
        function loadGames() {
            const saved = localStorage.getItem('languageRehabGames');
            if (saved) {
                games = JSON.parse(saved);
            }
            renderGameList();
        }

        // URL의 game 파라미터 확인
        function checkUrlGame() {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('game');
            
            if (gameId && games[gameId]) {
                playGameById(gameId);
            }
        }

        // 게임 생성 폼 표시
        function showCreateForm() {
            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('createSection').style.display = 'block';
            document.getElementById('boxCount').value = '6';
            document.getElementById('gameName').value = '';
        }

        // 게임 설정 (박스 생성)
        function createGameSetup() {
            const gameName = document.getElementById('gameName').value;
            boxCount = parseInt(document.getElementById('boxCount').value);

            if (!gameName) {
                alert('게임 이름을 입력하세요');
                return;
            }

            if (boxCount < 1 || boxCount > 100) {
                alert('1~100 사이의 숫자를 입력하세요');
                return;
            }

            files = new Array(boxCount);
            currentSearchResults = {};
            const container = document.getElementById('boxSetupContainer');
            container.innerHTML = '';

            for (let i = 0; i < boxCount; i++) {
                const boxSetup = document.createElement('div');
                boxSetup.className = 'box-setup-item';
                boxSetup.innerHTML = `
                    <div class="box-setup-item-title">박스 ${i + 1}</div>
                    
                    <div class="box-setup-item-tabs">
                        <button class="box-setup-item-tab active" onclick="switchBoxTab(${i}, 'upload')">파일</button>
                        <button class="box-setup-item-tab" onclick="switchBoxTab(${i}, 'search')">검색</button>
                    </div>

                    <div id="uploadContent-${i}" class="box-setup-item-content active">
                        <input type="file" accept="image/*" data-index="${i}" class="file-input" onchange="handleFileSelect(event)" />
                        <div class="preview" id="preview-${i}"></div>
                    </div>

                    <div id="searchContent-${i}" class="box-setup-item-content">
                        <div class="search-input-group">
                            <input type="search" data-index="${i}" class="search-input" placeholder="검색..." />
                            <button class="btn-primary btn-small" onclick="searchImagesForBox(${i})">검색</button>
                        </div>
                        <div class="search-results" id="searchResults-${i}"></div>
                        <div id="searchLoading-${i}" class="loading" style="display: none;">
                            <div class="spinner"></div>
                            <p>검색 중...</p>
                        </div>
                    </div>
                `;
                container.appendChild(boxSetup);
            }

            document.getElementById('fileInputSection').classList.add('active');
        }

        // 박스별 탭 전환
        function switchBoxTab(boxIndex, tab) {
            document.querySelectorAll(`#uploadContent-${boxIndex}, #searchContent-${boxIndex}`).forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll(`.box-setup-item:nth-child(${boxIndex + 1}) .box-setup-item-tab`).forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}Content-${boxIndex}`).classList.add('active');
            event.target.classList.add('active');
        }

        // 파일 선택 처리
        function handleFileSelect(event) {
            const file = event.target.files[0];
            const index = parseInt(event.target.dataset.index);

            if (file) {
                files[index] = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(`preview-${index}`).innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
                };
                reader.readAsDataURL(file);
            }
        }

        // 박스별 이미지 검색
        async function searchImagesForBox(boxIndex) {
            const searchInput = document.querySelector(`#searchContent-${boxIndex} .search-input`);
            const query = searchInput.value;
            
            if (!query) {
                alert('검색어를 입력하세요');
                return;
            }

            const loadingEl = document.getElementById(`searchLoading-${boxIndex}`);
            const resultsEl = document.getElementById(`searchResults-${boxIndex}`);
            
            loadingEl.style.display = 'block';
            resultsEl.innerHTML = '';

            try {
                const response = await fetch(
                    `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=12&client_id=${UNSPLASH_API_KEY}`
                );
                const data = await response.json();

                loadingEl.style.display = 'none';

                if (data.results.length === 0) {
                    resultsEl.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 0.8rem;">검색 결과가 없습니다</p>';
                    return;
                }

                const resultsHtml = data.results.map((image, idx) => `
                    <div class="search-result-item" id="result-${boxIndex}-${idx}" onclick="selectImageForBox(${boxIndex}, '${image.urls.small}', ${idx})">
                        <img src="${image.urls.small}" alt="Search result" />
                    </div>
                `).join('');

                resultsEl.innerHTML = resultsHtml;
                currentSearchResults[boxIndex] = data.results;
            } catch (error) {
                console.error('검색 오류:', error);
                loadingEl.style.display = 'none';
                alert('이미지 검색 중 오류가 발생했습니다');
            }
        }

        // 박스별 이미지 선택
        function selectImageForBox(boxIndex, imageUrl, resultIdx) {
            // 이전 선택 제거
            document.querySelectorAll(`#searchResults-${boxIndex} .search-result-item`).forEach(el => {
                el.classList.remove('selected');
            });

            // 현재 선택 표시
            document.getElementById(`result-${boxIndex}-${resultIdx}`).classList.add('selected');

            // 이미지를 Blob으로 변환
            fetch(imageUrl)
                .then(res => res.blob())
                .then(blob => {
                    files[boxIndex] = blob;
                    document.getElementById(`preview-${boxIndex}`).innerHTML = `<img src="${imageUrl}" alt="Preview" />`;
                    
                    // 선택 완료 후 자동으로 업로드 탭으로 이동
                    setTimeout(() => {
                        switchBoxTabAuto(boxIndex, 'upload');
                    }, 300);
                });
        }

        // 자동 탭 전환 함수
        function switchBoxTabAuto(boxIndex, tab) {
            document.querySelectorAll(`#uploadContent-${boxIndex}, #searchContent-${boxIndex}`).forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll(`.box-setup-item:nth-child(${boxIndex + 1}) .box-setup-item-tab`).forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}Content-${boxIndex}`).classList.add('active');
            document.querySelector(`.box-setup-item:nth-child(${boxIndex + 1}) .box-setup-item-tab:${tab === 'upload' ? 'first' : 'last'}-child`).classList.add('active');
        }

        // 게임 저장
        function saveGame() {
            const gameName = document.getElementById('gameName').value;
            const totalFiles = files.filter(f => f).length;

            if (totalFiles === 0) {
                alert('최소 하나의 이미지를 첨부하세요');
                return;
            }

            const gameId = Date.now().toString();
            let loadedCount = 0;
            const imageData = new Array(files.length);

            files.forEach((file, idx) => {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imageData[idx] = e.target.result;
                        loadedCount++;
                        if (loadedCount === totalFiles) {
                            finalizeSaveGame(gameId, gameName, imageData);
                        }
                    };
                    reader.readAsDataURL(file);
                } else {
                    loadedCount++;
                    if (loadedCount === totalFiles) {
                        finalizeSaveGame(gameId, gameName, imageData);
                    }
                }
            });
        }

        // 게임 저장 완료
        function finalizeSaveGame(gameId, gameName, imageData) {
            games[gameId] = {
                id: gameId,
                name: gameName,
                images: imageData,
                createdAt: new Date().toLocaleString()
            };

            localStorage.setItem('languageRehabGames', JSON.stringify(games));
            alert('게임이 저장되었습니다! 🎉');
            playGameById(gameId);
        }

        // 게임 플레이
        function playGameById(gameId) {
            currentGameId = gameId;
            gameImages = games[gameId].images.slice();
            isPlaying = true;
            clickedBoxes.clear();

            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('createSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('playGameTitle').textContent = games[gameId].name;

            const gameUrl = `${window.location.origin}${window.location.pathname}?game=${gameId}`;
            document.getElementById('gameUrl').value = gameUrl;
            document.getElementById('copyUrlSection').style.display = 'block';

            renderGallery();
        }

        // 플레이 활성화
        function playGame() {
            if (!isPlaying) {
                isPlaying = true;
                renderGallery();
            }
        }

        // 갤러리 렌더링
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const cols = Math.min(Math.ceil(Math.sqrt(gameImages.length)), 8);
            grid.style.gridTemplateColumns = `repeat(auto-fit, minmax(70px, 1fr))`;
            grid.innerHTML = '';

            gameImages.forEach((image, index) => {
                const box = document.createElement('button');
                box.className = 'box';

                if (!isPlaying) {
                    box.classList.add('disabled');
                }

                if (!clickedBoxes.has(index)) {
                    box.textContent = (index + 1);
                } else {
                    if (image) {
                        box.classList.add('opened');
                        box.innerHTML = `<img src="${image}" alt="Box ${index + 1}" />`;
                    } else {
                        box.classList.add('empty');
                    }
                }

                box.onclick = () => {
                    if (isPlaying) {
                        clickedBoxes.add(index);
                        renderGallery();
                        if (image) {
                            setTimeout(() => openModal(image), 300);
                        }
                    }
                };

                grid.appendChild(box);
            });
        }

        // 섞기
        function shuffleGame() {
            if (!isPlaying) {
                alert('플레이 버튼을 먼저 눌러주세요');
                return;
            }
            clickedBoxes.clear();
            for (let i = gameImages.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [gameImages[i], gameImages[j]] = [gameImages[j], gameImages[i]];
            }
            renderGallery();
        }

        // 리셋
        function resetGamePlay() {
            isPlaying = false;
            clickedBoxes.clear();
            gameImages = games[currentGameId].images.slice();
            renderGallery();
        }

        // 뒤로
        function backToHome() {
            currentGameId = null;
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            renderGameList();
        }

        // 모달 열기
        function openModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('active');
        }

        // 모달 닫기
        function closeModal(event) {
            if (event && event.target.id !== 'imageModal') return;
            document.getElementById('imageModal').classList.remove('active');
        }

        // URL 복사
        function copyGameUrl() {
            const gameUrl = document.getElementById('gameUrl');
            gameUrl.select();
            document.execCommand('copy');
            alert('링크가 복사되었습니다! 📋');
        }

        // 게임 목록 렌더링
        function renderGameList() {
            const container = document.getElementById('gameListContainer');
            const gameList = Object.values(games).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if (gameList.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 1.5rem;">게임이 없습니다. 새 게임을 만들어보세요!</p>';
                return;
            }

            container.innerHTML = '<div class="game-list">' + gameList.map(game => `
                <div class="game-card">
                    <div class="game-name">🎮 ${game.name}</div>
                    <div class="game-info">
                        ${game.images.filter(i => i).length}개 이미지<br>
                        <span style="font-size: 0.75rem;">${game.createdAt}</span>
                    </div>
                    <div class="game-actions">
                        <button class="btn-primary btn-small" onclick="playGameById('${game.id}')">플레이</button>
                        <button class="btn-danger btn-small" onclick="deleteGame('${game.id}')">삭제</button>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        // 게임 삭제
        function deleteGame(gameId) {
            if (confirm('정말 삭제하시겠습니까?')) {
                delete games[gameId];
                localStorage.setItem('languageRehabGames', JSON.stringify(games));
                renderGameList();
                alert('게임이 삭제되었습니다.');
            }
        }

        // 생성 취소
        function cancelCreate() {
            document.getElementById('gameName').value = '';
            document.getElementById('boxCount').value = '6';
            document.getElementById('fileInputSection').classList.remove('active');
            document.getElementById('createSection').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            files = [];
            currentSearchResults = {};
        }

        // 모달 이벤트
        document.getElementById('imageModal').addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
</body>
</html>
