<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Rehab Platform - 언어재활 게임 플랫폼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --primary-light: #E8F2FF;
            --success: #5BC236;
            --success-dark: #4A9E2D;
            --danger: #E74C3C;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --text-muted: #BDC3C7;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --border-color: #E1E8ED;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #F5F7FA 0%, #F8F9FB 100%);
            line-height: 1.6;
        }

        .navbar {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #C0392B;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .game-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .game-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .game-actions {
            display: flex;
            gap: 0.5rem;
        }

        .game-actions button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.85rem;
        }

        .file-input-section {
            display: none;
        }

        .file-input-section.active {
            display: block;
        }

        .file-input-info {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            max-height: 500px;
            overflow-y: auto;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .file-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file-box-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .file-input {
            padding: 0.5rem;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .preview {
            width: 100%;
            height: 100px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .gallery-section {
            display: none;
        }

        .gallery-section.active {
            display: block;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .gallery-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            margin-bottom: 2rem;
        }

        .box {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .box:hover:not(.disabled) {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .box.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .box.opened {
            background: var(--bg-primary);
        }

        .box.empty {
            background: #2C3E50;
        }

        .box img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 2rem;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
        }

        .modal-image {
            max-width: 80vw;
            max-height: 70vh;
            object-fit: contain;
            margin-bottom: 1.5rem;
        }

        .modal-close-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .copy-url {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .copy-url input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .copy-url button {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-left: 4px solid var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .game-list {
                grid-template-columns: 1fr;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            button {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div>
                <div class="navbar-brand">🎨 Language Rehab</div>
                <div class="navbar-subtitle">언어재활 게임 플랫폼</div>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-secondary);">v3.0</div>
        </div>
    </nav>

    <div class="container">
        <!-- 게임 목록 섹션 -->
        <div class="card" id="homeSection">
            <h2 class="card-title">📚 내 게임</h2>
            
            <button class="btn-success" onclick="showCreateForm()" style="margin-bottom: 2rem; width: 100%; padding: 1rem;">
                ➕ 새 게임 만들기
            </button>

            <div id="gameListContainer">
                <p style="text-align: center; color: var(--text-secondary); padding: 2rem;">게임이 없습니다. 새 게임을 만들어보세요!</p>
            </div>
        </div>

        <!-- 게임 생성 섹션 -->
        <div class="card" id="createSection" style="display: none;">
            <h2 class="card-title">새 게임 만들기</h2>
            
            <div class="form-group">
                <label class="form-label">게임 이름</label>
                <input type="text" id="gameName" placeholder="예: 동물 학습, 과일 카드" />
            </div>

            <div class="form-group">
                <label class="form-label">박스 개수 (1~100)</label>
                <input type="number" id="boxCount" min="1" max="100" value="6" />
            </div>

            <button class="btn-primary" onclick="createGameSetup()" style="width: 100%; padding: 1rem;">박스 생성</button>

            <div class="file-input-section" id="fileInputSection">
                <div class="file-input-info">📁 각 박스에 이미지를 첨부하세요</div>
                <div class="file-grid" id="fileGrid"></div>
                <div class="button-group">
                    <button class="btn-success" style="flex: 1;" onclick="saveGame()">게임 저장 💾</button>
                    <button class="btn-secondary" style="flex: 1;" onclick="cancelCreate()">취소</button>
                </div>
            </div>
        </div>

        <!-- 게임 플레이 섹션 -->
        <div class="card" id="playSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="card-title" style="margin: 0;" id="playGameTitle">게임 플레이</h2>
                <div class="button-group">
                    <button class="btn-success" onclick="playGame()">플레이 ▶</button>
                    <button class="btn-primary" onclick="shuffleGame()">섞기 🔀</button>
                    <button class="btn-secondary" onclick="resetGamePlay()">리셋</button>
                    <button class="btn-secondary" onclick="backToHome()">뒤로</button>
                </div>
            </div>

            <div id="copyUrlSection" style="display: none;">
                <p style="margin-bottom: 0.5rem; font-weight: 600;">공유 링크:</p>
                <div class="copy-url">
                    <input type="text" id="gameUrl" readonly />
                    <button class="btn-primary" onclick="copyGameUrl()">복사</button>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">이 링크를 공유하면 누구나 이 게임을 플레이할 수 있습니다!</p>
            </div>

            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <!-- 이미지 확대 모달 -->
    <div class="modal" id="imageModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImage" class="modal-image" alt="확대 이미지" />
            <div class="modal-close-hint">빈칸을 누르면 닫힙니다</div>
        </div>
    </div>

    <script>
        let games = {};
        let currentGameId = null;
        let files = [];
        let gameImages = [];
        let isPlaying = false;
        let clickedBoxes = new Set();

        // 초기화
        function init() {
            loadGames();
            checkUrlGame();
        }

        // 로컬 스토리지에서 게임 로드
        function loadGames() {
            const saved = localStorage.getItem('languageRehabGames');
            if (saved) {
                games = JSON.parse(saved);
            }
            renderGameList();
        }

        // URL의 game 파라미터 확인
        function checkUrlGame() {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('game');
            
            if (gameId && games[gameId]) {
                playGameById(gameId);
            }
        }

        // 게임 생성 폼 표시
        function showCreateForm() {
            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('createSection').style.display = 'block';
            document.getElementById('boxCount').value = '6';
            document.getElementById('gameName').value = '';
        }

        // 게임 설정 (박스 생성)
        function createGameSetup() {
            const gameName = document.getElementById('gameName').value;
            const boxCount = parseInt(document.getElementById('boxCount').value);

            if (!gameName) {
                alert('게임 이름을 입력하세요');
                return;
            }

            if (boxCount < 1 || boxCount > 100) {
                alert('1~100 사이의 숫자를 입력하세요');
                return;
            }

            files = new Array(boxCount);
            const fileGrid = document.getElementById('fileGrid');
            fileGrid.innerHTML = '';

            for (let i = 0; i < boxCount; i++) {
                const fileBox = document.createElement('div');
                fileBox.className = 'file-box';
                fileBox.innerHTML = `
                    <label class="file-box-label">박스 ${i + 1}</label>
                    <input type="file" accept="image/*" data-index="${i}" class="file-input" onchange="handleFileSelect(event)" />
                    <div class="preview" id="preview-${i}"></div>
                `;
                fileGrid.appendChild(fileBox);
            }

            document.getElementById('fileInputSection').classList.add('active');
        }

        // 파일 선택 처리
        function handleFileSelect(event) {
            const file = event.target.files[0];
            const index = parseInt(event.target.dataset.index);

            if (file) {
                files[index] = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(`preview-${index}`).innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
                };
                reader.readAsDataURL(file);
            }
        }

        // 게임 저장
        function saveGame() {
            const gameName = document.getElementById('gameName').value;
            const totalFiles = files.filter(f => f).length;

            if (totalFiles === 0) {
                alert('최소 하나의 이미지를 첨부하세요');
                return;
            }

            const gameId = Date.now().toString();
            let loadedCount = 0;
            const imageData = new Array(files.length);

            files.forEach((file, idx) => {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imageData[idx] = e.target.result;
                        loadedCount++;
                        if (loadedCount === totalFiles) {
                            finalizeSaveGame(gameId, gameName, imageData);
                        }
                    };
                    reader.readAsDataURL(file);
                } else {
                    loadedCount++;
                    if (loadedCount === totalFiles) {
                        finalizeSaveGame(gameId, gameName, imageData);
                    }
                }
            });
        }

        // 게임 저장 완료
        function finalizeSaveGame(gameId, gameName, imageData) {
            games[gameId] = {
                id: gameId,
                name: gameName,
                images: imageData,
                createdAt: new Date().toLocaleString()
            };

            localStorage.setItem('languageRehabGames', JSON.stringify(games));
            alert('게임이 저장되었습니다! 🎉');
            resetCreate();
        }

        // 게임 플레이
        function playGameById(gameId) {
            currentGameId = gameId;
            gameImages = games[gameId].images.slice();
            isPlaying = false;
            clickedBoxes.clear();

            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('createSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('playGameTitle').textContent = games[gameId].name;

            const gameUrl = `${window.location.origin}${window.location.pathname}?game=${gameId}`;
            document.getElementById('gameUrl').value = gameUrl;
            document.getElementById('copyUrlSection').style.display = 'block';

            renderGallery();
        }

        // 플레이 활성화
        function playGame() {
            if (!isPlaying) {
                isPlaying = true;
                renderGallery();
            }
        }

        // 갤러리 렌더링
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const cols = Math.min(Math.ceil(Math.sqrt(gameImages.length)), 8);
            grid.style.gridTemplateColumns = `repeat(auto-fit, minmax(100px, 1fr))`;
            grid.innerHTML = '';

            gameImages.forEach((image, index) => {
                const box = document.createElement('button');
                box.className = 'box';

                if (!isPlaying) {
                    box.classList.add('disabled');
                }

                if (!clickedBoxes.has(index)) {
                    box.textContent = (index + 1);
                } else {
                    if (image) {
                        box.classList.add('opened');
                        box.innerHTML = `<img src="${image}" alt="Box ${index + 1}" />`;
                    } else {
                        box.classList.add('empty');
                    }
                }

                box.onclick = () => {
                    if (isPlaying) {
                        clickedBoxes.add(index);
                        renderGallery();
                        if (image) {
                            setTimeout(() => openModal(image), 300);
                        }
                    }
                };

                grid.appendChild(box);
            });
        }

        // 섞기
        function shuffleGame() {
            if (!isPlaying) {
                alert('플레이 버튼을 먼저 눌러주세요');
                return;
            }
            clickedBoxes.clear();
            for (let i = gameImages.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [gameImages[i], gameImages[j]] = [gameImages[j], gameImages[i]];
            }
            renderGallery();
        }

        // 리셋
        function resetGamePlay() {
            isPlaying = false;
            clickedBoxes.clear();
            gameImages = games[currentGameId].images.slice();
            renderGallery();
        }

        // 뒤로
        function backToHome() {
            currentGameId = null;
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            renderGameList();
        }

        // 모달 열기
        function openModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('active');
        }

        // 모달 닫기
        function closeModal(event) {
            if (event && event.target.id !== 'imageModal') return;
            document.getElementById('imageModal').classList.remove('active');
        }

        // URL 복사
        function copyGameUrl() {
            const gameUrl = document.getElementById('gameUrl');
            gameUrl.select();
            document.execCommand('copy');
            alert('링크가 복사되었습니다! 📋');
        }

        // 게임 목록 렌더링
        function renderGameList() {
            const container = document.getElementById('gameListContainer');
            const gameList = Object.values(games).sort((a, b) => b.createdAt - a.createdAt);

            if (gameList.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">게임이 없습니다. 새 게임을 만들어보세요!</p>';
                return;
            }

            container.innerHTML = '<div class="game-list">' + gameList.map(game => `
                <div class="game-card">
                    <div class="game-name">🎮 ${game.name}</div>
                    <div class="game-info">
                        ${game.images.filter(i => i).length}개 이미지<br>
                        <span style="font-size: 0.8rem;">${game.createdAt}</span>
                    </div>
                    <div class="game-actions">
                        <button class="btn-primary" onclick="playGameById('${game.id}')">플레이</button>
                        <button class="btn-danger" onclick="deleteGame('${game.id}')">삭제</button>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        // 게임 삭제
        function deleteGame(gameId) {
            if (confirm('정말 삭제하시겠습니까?')) {
                delete games[gameId];
                localStorage.setItem('languageRehabGames', JSON.stringify(games));
                renderGameList();
                alert('게임이 삭제되었습니다.');
            }
        }

        // 생성 취소
        function cancelCreate() {
            document.getElementById('gameName').value = '';
            document.getElementById('boxCount').value = '6';
            document.getElementById('fileInputSection').classList.remove('active');
            document.getElementById('createSection').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            files = [];
        }

        // 생성 초기화
        function resetCreate() {
            cancelCreate();
            renderGameList();
        }

        // 모달 이벤트
        document.getElementById('imageModal').addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
</body>
</html>
